spring:
  application:
    name: top-talent-management
  profiles:
    active: dev
  security:
    oauth2:
      client:
        registration:
          epam:
            client-id: ${client_id}
            client-secret: ${client_secret}
            provider: epam
            scope:
              - openid
              - basic
              - email
              - profile
            authorization-grant-type: authorization_code
            response-type: code

        provider:
          epam:
            issuer-uri: https://access-staging.epam.com/auth/realms/plusx
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${jwt_secret}
  expiration: 3600000

access:
  epam:
    url: https://access-staging.epam.com/auth/realms/plusx/protocol/openid-connect/token

api:
  epam:
    client-id: oauth-client.epm-plx.epam-api.staging
    url: https://staging.dev.api.epam.com/v2